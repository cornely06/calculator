<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Calculator</title>
        <link rel="stylesheet" href="style-desktop.css">
    </head>
    <body>
        <div id="calculator">
            <div>
                <div id="display"><p id="output"></p></div>
                <div id="digits">
                    <button id="decimal">.</button>
                    <button class="num" id="numTest">0</button>
                    <button id="equals">=</button>
                </div>
            </div>
            <div id="operators">
                <button id="backspace" class="operators">&lt-</button>
                <button id="clear" class="operators">c</button>
                <button id="add" class="operators math">+</button>
                <button id="subtract" class="operators math">-</button>
                <button id="multiply" class="operators math">x</button>
                <button id="divide" class="operators math">/</button>
            </div>
        </div>
        <script type="text/javascript" src="script.js"></script>
    </body>
</html>
